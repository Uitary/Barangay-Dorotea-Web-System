function seedData() {
  try {
    var existing = JSON.parse(localStorage.getItem('residents') || '[]');
    var merged = existing.concat(residentsData);
    // Remove duplicates by userId
    var seen = new Set();
    var unique = merged.filter(function(r) {
      if (seen.has(r.userId)) return false;
      seen.add(r.userId);
      return true;
    });
    localStorage.setItem('residents', JSON.stringify(unique));
    document.getElementById('status').className = 'success';
    document.getElementById('status').textContent = 'Done! ' + residentsData.length + ' residents loaded. You can now close this tab and open the portal.';
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}
